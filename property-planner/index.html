<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naples Property — To Do</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }
        
        .app-layout { display: flex; min-height: 100vh; }
        
        .left-nav {
            width: 180px;
            background: #0a0a12;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .nav-header {
            padding: 20px 15px;
            font-weight: 600;
            font-size: 1rem;
            color: #4ade80;
            border-bottom: 1px solid #222;
        }
        
        .nav-item {
            padding: 14px 15px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-item.active { color: #4ade80; border-left-color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        
        .main-content { flex: 1; overflow-y: auto; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        h1 { font-size: 2rem; color: #4ade80; }
        
        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 8px;
            background: #12121a;
            border: 1px solid #333;
            font-size: 0.85rem;
        }
        
        .sync-status.synced { border-color: #4ade80; color: #4ade80; }
        .sync-status.syncing { border-color: #f59e0b; color: #f59e0b; }
        .sync-status.error { border-color: #ef4444; color: #ef4444; }
        
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .add-task { display: flex; gap: 10px; margin-bottom: 30px; }
        
        .add-task input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #12121a;
            color: #fff;
            font-size: 1rem;
        }
        
        .add-task input:focus { outline: none; border-color: #4ade80; }
        
        .add-task button {
            padding: 15px 30px;
            background: #4ade80;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .categories { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        
        .category-btn {
            padding: 8px 16px;
            border: 2px solid #333;
            border-radius: 20px;
            background: transparent;
            color: #888;
            font-size: 0.85rem;
            cursor: pointer;
        }
        
        .category-btn:hover { border-color: #4ade80; color: #4ade80; }
        .category-btn.active { background: #4ade80; border-color: #4ade80; color: #000; }
        
        .task-list { display: flex; flex-direction: column; gap: 10px; }
        
        .task-item {
            background: #12121a;
            border-radius: 12px;
            border: 1px solid #222;
            overflow: hidden;
            user-select: none;
        }
        
        .task-item:hover { border-color: #333; }
        .task-item.expanded { border-color: #4ade80; }
        .task-item.dragging { opacity: 0.5; border-color: #4ade80; transform: scale(1.02); }
        .task-item.drag-over { border-color: #f59e0b; border-width: 2px; }
        .task-item.completed .task-header { opacity: 0.5; }
        .task-item.completed .task-text { text-decoration: line-through; }
        
        .task-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 20px;
            cursor: pointer;
        }
        
        .drag-handle { cursor: grab; color: #444; font-size: 1.2rem; padding: 5px; touch-action: none; }
        .drag-handle:active { cursor: grabbing; }
        
        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #444;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .task-checkbox:hover { border-color: #4ade80; }
        .task-checkbox.checked { background: #4ade80; border-color: #4ade80; }
        .task-checkbox.checked::after { content: "✓"; color: #000; font-weight: bold; }
        
        .task-text { flex: 1; font-size: 1rem; }
        
        .task-meta { display: flex; align-items: center; gap: 10px; }
        .task-has-notes { font-size: 0.7rem; color: #4ade80; }
        
        .task-category {
            padding: 4px 10px;
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
            border-radius: 12px;
            font-size: 0.75rem;
            flex-shrink: 0;
        }
        
        .task-category.permits { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .task-category.design { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .task-category.construction { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .task-category.equipment { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
        
        .task-expand { color: #666; font-size: 1.2rem; transition: transform 0.2s; }
        .task-item.expanded .task-expand { transform: rotate(180deg); }
        
        .task-delete {
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            border-radius: 6px;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .task-delete:hover { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        .task-details {
            display: none;
            padding: 0 20px 20px;
            border-top: 1px solid #222;
        }
        
        .task-item.expanded .task-details { display: block; }
        
        .detail-section { margin-top: 15px; }
        
        .detail-section label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .detail-section textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0a0a0f;
            color: #fff;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        
        .detail-section textarea:focus { outline: none; border-color: #4ade80; }
        
        .links-list { display: flex; flex-direction: column; gap: 8px; }
        
        .link-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        
        .link-item a { flex: 1; color: #4ade80; text-decoration: none; font-size: 0.9rem; word-break: break-all; }
        .link-item a:hover { text-decoration: underline; }
        
        .link-delete { background: none; border: none; color: #666; cursor: pointer; font-size: 1rem; padding: 5px; }
        .link-delete:hover { color: #ef4444; }
        
        .add-link { display: flex; gap: 8px; margin-top: 10px; }
        
        .add-link input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0a0a0f;
            color: #fff;
            font-size: 0.9rem;
        }
        
        .add-link input:focus { outline: none; border-color: #4ade80; }
        
        .add-link button {
            padding: 10px 16px;
            background: #4ade80;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        
        .stat-box {
            padding: 15px 20px;
            background: #12121a;
            border-radius: 10px;
            border: 1px solid #222;
        }
        
        .stat-box .number { font-size: 1.5rem; font-weight: 700; color: #4ade80; }
        .stat-box .label { font-size: 0.8rem; color: #888; }
        
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: rgba(74, 222, 128, 0.9);
            color: #000;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .mobile-menu-btn.open { background: #dc2626; color: white; }
        
        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 99;
        }
        
        .mobile-overlay.show { display: block; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #4ade80;
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show { opacity: 1; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-state h3 { margin-bottom: 10px; color: #888; }
        
        @media (max-width: 768px) {
            .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
            .left-nav { position: fixed; top: 0; left: -200px; height: 100vh; z-index: 100; transition: left 0.3s ease; }
            .left-nav.open { left: 0; }
            .container { padding: 80px 15px 30px; }
            h1 { font-size: 1.5rem; }
            .header-row { flex-direction: column; align-items: flex-start; }
            .add-task { flex-direction: column; }
            .add-task button { width: 100%; }
            .stats { flex-wrap: wrap; gap: 10px; }
            .stat-box { flex: 1; min-width: 90px; text-align: center; }
            .task-header { padding: 14px; gap: 10px; }
            .task-category { display: none; }
            .task-details { padding: 0 14px 14px; }
            .add-link { flex-direction: column; }
            .drag-handle { padding: 10px; }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">☰</button>
    <div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>
    <div class="toast" id="toast"></div>
    
    <div class="app-layout">
        <nav class="left-nav" id="leftNav">
            <div class="nav-header">🏡 Naples Property</div>
            <a href="index.html" class="nav-item active">✅ To Do</a>
            <a href="planner.html" class="nav-item">🗺️ Planner</a>
            <a href="barn-blueprint-5k.html" class="nav-item">📐 Blueprint</a>
            <a href="barn-mockups.html" class="nav-item">🖼️ Mockups</a>
        </nav>
        
        <div class="main-content">
            <div class="container">
                <div class="header-row">
                    <h1>✅ Naples Property — To Do</h1>
                    <div class="sync-status syncing" id="syncStatus">
                        <span class="sync-dot"></span>
                        <span id="syncText">Syncing...</span>
                    </div>
                </div>
                
                <div class="stats">
                    <div class="stat-box">
                        <div class="number" id="totalTasks">0</div>
                        <div class="label">Total</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="completedTasks">0</div>
                        <div class="label">Done</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="remainingTasks">0</div>
                        <div class="label">Left</div>
                    </div>
                </div>
                
                <div class="add-task">
                    <input type="text" id="newTaskInput" placeholder="Add a new task..." onkeypress="if(event.key==='Enter')addTask()">
                    <button onclick="addTask()">Add</button>
                </div>
                
                <div class="categories">
                    <button class="category-btn active" data-category="all" onclick="filterCategory('all')">All</button>
                    <button class="category-btn" data-category="permits" onclick="filterCategory('permits')">🏛️ Permits</button>
                    <button class="category-btn" data-category="design" onclick="filterCategory('design')">📐 Design</button>
                    <button class="category-btn" data-category="construction" onclick="filterCategory('construction')">🏗️ Construction</button>
                    <button class="category-btn" data-category="equipment" onclick="filterCategory('equipment')">🎯 Equipment</button>
                </div>
                
                <div class="task-list" id="taskList"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Cloud sync config
        const BLOB_ID = '019c8753-ec0b-7648-85f0-b1abf18cbbec';
        const BLOB_API = `https://jsonblob.com/api/jsonBlob/${BLOB_ID}`;
        const STORAGE_KEY = 'naplesPropertyTodos_v3';
        
        let tasks = [];
        let currentFilter = 'all';
        let expandedTaskId = null;
        let draggedTaskId = null;
        let syncTimer = null;
        let isSyncing = false;
        
        function toggleMobileMenu() {
            const nav = document.getElementById('leftNav');
            const overlay = document.getElementById('mobileOverlay');
            const btn = document.getElementById('mobileMenuBtn');
            nav.classList.toggle('open');
            overlay.classList.toggle('show');
            btn.classList.toggle('open');
            btn.textContent = btn.classList.contains('open') ? '✕' : '☰';
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        function updateSyncStatus(status, text) {
            const el = document.getElementById('syncStatus');
            const textEl = document.getElementById('syncText');
            el.className = 'sync-status ' + status;
            textEl.textContent = text;
        }
        
        // Load from cloud first, fallback to local
        async function loadTasks() {
            updateSyncStatus('syncing', 'Syncing...');
            
            try {
                const response = await fetch(BLOB_API);
                if (response.ok) {
                    const data = await response.json();
                    tasks = data.tasks || [];
                    tasks = tasks.map(t => ({ ...t, notes: t.notes || '', links: t.links || [] }));
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
                    updateSyncStatus('synced', 'Synced ✓');
                    renderTasks();
                    return;
                }
            } catch (e) {
                console.log('Cloud sync failed, using local');
            }
            
            // Fallback to local
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                tasks = JSON.parse(saved);
                tasks = tasks.map(t => ({ ...t, notes: t.notes || '', links: t.links || [] }));
            } else {
                tasks = getDefaultTasks();
            }
            updateSyncStatus('error', 'Offline');
            renderTasks();
        }
        
        function getDefaultTasks() {
            return [
                { id: 1, text: "Privacy bushes?", category: "construction", completed: false, notes: '', links: [] },
                { id: 2, text: "Light up driveway & walkways & trees", category: "construction", completed: false, notes: '', links: [] },
                { id: 3, text: "Garage storage", category: "construction", completed: false, notes: '', links: [] },
                { id: 4, text: "Walls painted", category: "construction", completed: false, notes: '', links: [] },
                { id: 5, text: "Front gate", category: "construction", completed: false, notes: '', links: ['https://superiorfenceandrail.com'] },
                { id: 6, text: "Landscaping", category: "construction", completed: false, notes: '', links: [] },
                { id: 7, text: "Furniture", category: "equipment", completed: false, notes: '', links: [] },
                { id: 8, text: "Filing cabinet", category: "equipment", completed: false, notes: '', links: [] },
                { id: 9, text: "Whiteboard for wall", category: "equipment", completed: false, notes: '', links: [] },
                { id: 10, text: "Curtains", category: "equipment", completed: false, notes: '', links: [] },
                { id: 11, text: "Glass garage doors", category: "construction", completed: false, notes: '', links: [] },
                { id: 12, text: "220 in garage for sauna", category: "construction", completed: false, notes: '', links: [] },
                { id: 13, text: "Tesla charger in garage", category: "construction", completed: false, notes: '', links: [] },
                { id: 14, text: "New gym mat", category: "equipment", completed: false, notes: '', links: [] },
                { id: 15, text: "Tortoise 🐢", category: "equipment", completed: false, notes: '', links: [] },
                { id: 16, text: "Patio furniture", category: "equipment", completed: false, notes: '', links: [] },
                { id: 17, text: "Speaker system", category: "equipment", completed: false, notes: '', links: [] },
                { id: 18, text: "Tesla power walls", category: "construction", completed: false, notes: '', links: [] },
                { id: 19, text: "Tesla solar panels", category: "construction", completed: false, notes: '', links: [] },
                { id: 20, text: "Mini golf course (popstroke style)", category: "design", completed: false, notes: '', links: [] },
            ];
        }
        
        // Debounced save to cloud
        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            
            clearTimeout(syncTimer);
            syncTimer = setTimeout(syncToCloud, 1000);
        }
        
        async function syncToCloud() {
            if (isSyncing) return;
            isSyncing = true;
            updateSyncStatus('syncing', 'Saving...');
            
            try {
                const response = await fetch(BLOB_API, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tasks, updated: new Date().toISOString() })
                });
                
                if (response.ok) {
                    updateSyncStatus('synced', 'Synced ✓');
                } else {
                    updateSyncStatus('error', 'Sync failed');
                }
            } catch (e) {
                updateSyncStatus('error', 'Offline');
            }
            
            isSyncing = false;
        }
        
        function addTask() {
            const input = document.getElementById('newTaskInput');
            const text = input.value.trim();
            if (!text) return;
            
            const activeCategory = document.querySelector('.category-btn.active');
            let category = activeCategory ? activeCategory.dataset.category : 'permits';
            if (category === 'all') category = 'permits';
            
            tasks.unshift({ id: Date.now(), text, category, completed: false, notes: '', links: [] });
            input.value = '';
            saveTasks();
            renderTasks();
        }
        
        function toggleTask(id, e) {
            e.stopPropagation();
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }
        
        function deleteTask(id, e) {
            e.stopPropagation();
            if (!confirm('Delete this task?')) return;
            tasks = tasks.filter(t => t.id !== id);
            if (expandedTaskId === id) expandedTaskId = null;
            saveTasks();
            renderTasks();
        }
        
        function toggleExpand(id) {
            expandedTaskId = expandedTaskId === id ? null : id;
            renderTasks();
        }
        
        function updateNotes(id, notes) {
            const task = tasks.find(t => t.id === id);
            if (task) { task.notes = notes; saveTasks(); }
        }
        
        function addLink(id) {
            const input = document.getElementById(`link-input-${id}`);
            let url = input.value.trim();
            if (!url) return;
            if (!url.match(/^https?:\/\//)) url = 'https://' + url;
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.links = task.links || [];
                task.links.push(url);
                saveTasks();
                renderTasks();
            }
        }
        
        function deleteLink(taskId, linkIndex, e) {
            e.stopPropagation();
            const task = tasks.find(t => t.id === taskId);
            if (task && task.links) { task.links.splice(linkIndex, 1); saveTasks(); renderTasks(); }
        }
        
        function filterCategory(category) {
            currentFilter = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
            renderTasks();
        }
        
        function formatUrl(url) {
            try { const u = new URL(url); return u.hostname; } catch { return url; }
        }
        
        // Drag and drop (desktop)
        function handleDragStart(e, id) {
            draggedTaskId = id;
            e.target.closest('.task-item').classList.add('dragging');
        }
        
        function handleDragEnd(e) {
            document.querySelectorAll('.task-item').forEach(el => el.classList.remove('dragging', 'drag-over'));
            draggedTaskId = null;
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            const taskItem = e.target.closest('.task-item');
            if (taskItem && !taskItem.classList.contains('dragging')) {
                document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
                taskItem.classList.add('drag-over');
            }
        }
        
        function handleDrop(e, targetId) {
            e.preventDefault();
            if (draggedTaskId === null || draggedTaskId === targetId) return;
            const draggedIndex = tasks.findIndex(t => t.id === draggedTaskId);
            const targetIndex = tasks.findIndex(t => t.id === targetId);
            if (draggedIndex === -1 || targetIndex === -1) return;
            const [draggedTask] = tasks.splice(draggedIndex, 1);
            tasks.splice(targetIndex, 0, draggedTask);
            saveTasks();
            renderTasks();
        }
        
        // Touch drag support
        let touchedTaskId = null, touchedElement = null, longPressTimer = null, isDraggingTouch = false;
        
        function handleTouchStart(e, id) {
            touchedTaskId = id;
            touchedElement = e.target.closest('.task-item');
            longPressTimer = setTimeout(() => {
                isDraggingTouch = true;
                touchedElement.classList.add('dragging');
                navigator.vibrate && navigator.vibrate(50);
            }, 400);
        }
        
        function handleTouchMove(e) {
            if (!isDraggingTouch) { clearTimeout(longPressTimer); return; }
            e.preventDefault();
            const touch = e.touches[0];
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            const targetTask = el?.closest('.task-item');
            document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
            if (targetTask && targetTask !== touchedElement) targetTask.classList.add('drag-over');
        }
        
        function handleTouchEnd(e) {
            clearTimeout(longPressTimer);
            if (isDraggingTouch) {
                const touch = e.changedTouches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const targetTask = el?.closest('.task-item');
                if (targetTask && targetTask !== touchedElement) {
                    const targetId = parseInt(targetTask.dataset.id);
                    if (touchedTaskId && targetId) {
                        const draggedIndex = tasks.findIndex(t => t.id === touchedTaskId);
                        const targetIndex = tasks.findIndex(t => t.id === targetId);
                        if (draggedIndex !== -1 && targetIndex !== -1) {
                            const [draggedTask] = tasks.splice(draggedIndex, 1);
                            tasks.splice(targetIndex, 0, draggedTask);
                            saveTasks();
                            renderTasks();
                        }
                    }
                }
            }
            document.querySelectorAll('.task-item').forEach(el => el.classList.remove('dragging', 'drag-over'));
            isDraggingTouch = false;
            touchedTaskId = null;
            touchedElement = null;
        }
        
        function renderTasks() {
            const list = document.getElementById('taskList');
            const filtered = currentFilter === 'all' ? tasks : tasks.filter(t => t.category === currentFilter);
            
            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state"><h3>No tasks</h3><p>Add one above</p></div>`;
            } else {
                list.innerHTML = filtered.map(task => {
                    const isExpanded = expandedTaskId === task.id;
                    const hasContent = task.notes || (task.links && task.links.length > 0);
                    return `
                    <div class="task-item ${task.completed ? 'completed' : ''} ${isExpanded ? 'expanded' : ''}" 
                         data-id="${task.id}" draggable="true"
                         ondragstart="handleDragStart(event, ${task.id})" ondragend="handleDragEnd(event)"
                         ondragover="handleDragOver(event)" ondrop="handleDrop(event, ${task.id})"
                         ontouchstart="handleTouchStart(event, ${task.id})" ontouchmove="handleTouchMove(event)" ontouchend="handleTouchEnd(event)">
                        <div class="task-header" onclick="toggleExpand(${task.id})">
                            <span class="drag-handle" onclick="event.stopPropagation()">⋮⋮</span>
                            <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id}, event)"></div>
                            <span class="task-text">${task.text}</span>
                            <div class="task-meta">
                                ${hasContent ? '<span class="task-has-notes">📎</span>' : ''}
                                <span class="task-category ${task.category}">${task.category}</span>
                            </div>
                            <span class="task-expand">▼</span>
                            <button class="task-delete" onclick="deleteTask(${task.id}, event)">×</button>
                        </div>
                        <div class="task-details">
                            <div class="detail-section">
                                <label>📝 Notes</label>
                                <textarea placeholder="Add notes..." onchange="updateNotes(${task.id}, this.value)" onclick="event.stopPropagation()">${task.notes || ''}</textarea>
                            </div>
                            <div class="detail-section">
                                <label>🔗 Links</label>
                                <div class="links-list">
                                    ${(task.links || []).map((link, i) => `
                                        <div class="link-item">
                                            <a href="${link}" target="_blank" onclick="event.stopPropagation()">${formatUrl(link)}</a>
                                            <button class="link-delete" onclick="deleteLink(${task.id}, ${i}, event)">×</button>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="add-link" onclick="event.stopPropagation()">
                                    <input type="text" id="link-input-${task.id}" placeholder="Add a link..." onkeypress="if(event.key==='Enter'){addLink(${task.id});event.preventDefault();}">
                                    <button onclick="addLink(${task.id})">Add</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `}).join('');
            }
            
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('completedTasks').textContent = tasks.filter(t => t.completed).length;
            document.getElementById('remainingTasks').textContent = tasks.filter(t => !t.completed).length;
        }
        
        // Auto-refresh from cloud every 30 seconds
        setInterval(async () => {
            if (isSyncing) return;
            try {
                const response = await fetch(BLOB_API);
                if (response.ok) {
                    const data = await response.json();
                    const cloudTasks = data.tasks || [];
                    // Only update if cloud has newer data (more items or different)
                    if (JSON.stringify(cloudTasks) !== JSON.stringify(tasks)) {
                        tasks = cloudTasks.map(t => ({ ...t, notes: t.notes || '', links: t.links || [] }));
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
                        renderTasks();
                        updateSyncStatus('synced', 'Updated ✓');
                    }
                }
            } catch (e) {}
        }, 30000);
        
        loadTasks();
    </script>
</body>
</html>
