<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naples Property — To Do</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }
        
        .app-layout {
            display: flex;
            min-height: 100vh;
        }
        
        .left-nav {
            width: 180px;
            background: #0a0a12;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .nav-header {
            padding: 20px 15px;
            font-weight: 600;
            font-size: 1rem;
            color: #4ade80;
            border-bottom: 1px solid #222;
        }
        
        .nav-item {
            padding: 14px 15px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        
        .nav-item:hover {
            color: #fff;
            background: rgba(255,255,255,0.05);
        }
        
        .nav-item.active {
            color: #4ade80;
            border-left-color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }
        
        .main-content {
            flex: 1;
            overflow-y: auto;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #4ade80;
        }
        
        .add-task {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .add-task input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #12121a;
            color: #fff;
            font-size: 1rem;
        }
        
        .add-task input:focus {
            outline: none;
            border-color: #4ade80;
        }
        
        .add-task button {
            padding: 15px 30px;
            background: #4ade80;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .add-task button:hover {
            background: #22c55e;
        }
        
        .categories {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .category-btn {
            padding: 8px 16px;
            border: 2px solid #333;
            border-radius: 20px;
            background: transparent;
            color: #888;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .category-btn:hover {
            border-color: #4ade80;
            color: #4ade80;
        }
        
        .category-btn.active {
            background: #4ade80;
            border-color: #4ade80;
            color: #000;
        }
        
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 20px;
            background: #12121a;
            border-radius: 12px;
            border: 1px solid #222;
            transition: all 0.2s;
        }
        
        .task-item:hover {
            border-color: #333;
        }
        
        .task-item.completed {
            opacity: 0.5;
        }
        
        .task-item.completed .task-text {
            text-decoration: line-through;
        }
        
        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #444;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .task-checkbox:hover {
            border-color: #4ade80;
        }
        
        .task-checkbox.checked {
            background: #4ade80;
            border-color: #4ade80;
        }
        
        .task-checkbox.checked::after {
            content: "✓";
            color: #000;
            font-weight: bold;
        }
        
        .task-text {
            flex: 1;
            font-size: 1rem;
        }
        
        .task-category {
            padding: 4px 10px;
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
            border-radius: 12px;
            font-size: 0.75rem;
            flex-shrink: 0;
        }
        
        .task-category.permits { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .task-category.design { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .task-category.construction { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .task-category.equipment { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
        
        .task-delete {
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            border-radius: 6px;
            font-size: 1.2rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .task-delete:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state h3 {
            margin-bottom: 10px;
            color: #888;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            padding: 15px 20px;
            background: #12121a;
            border-radius: 10px;
            border: 1px solid #222;
        }
        
        .stat-box .number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #4ade80;
        }
        
        .stat-box .label {
            font-size: 0.8rem;
            color: #888;
        }
        
        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: rgba(74, 222, 128, 0.9);
            color: #000;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .mobile-menu-btn.open {
            background: #dc2626;
            color: white;
        }
        
        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 99;
        }
        
        .mobile-overlay.show {
            display: block;
        }
        
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .left-nav {
                position: fixed;
                top: 0;
                left: -200px;
                height: 100vh;
                z-index: 100;
                transition: left 0.3s ease;
            }
            
            .left-nav.open {
                left: 0;
            }
            
            .container {
                padding: 80px 15px 30px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .add-task {
                flex-direction: column;
            }
            
            .add-task button {
                width: 100%;
            }
            
            .stats {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .stat-box {
                flex: 1;
                min-width: 90px;
                text-align: center;
            }
            
            .task-item {
                padding: 14px;
                gap: 10px;
            }
            
            .task-category {
                display: none;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">☰</button>
    <div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>
    
    <div class="app-layout">
        <nav class="left-nav" id="leftNav">
            <div class="nav-header">🏡 Naples Property</div>
            <a href="index.html" class="nav-item active">✅ To Do</a>
            <a href="planner.html" class="nav-item">🗺️ Planner</a>
            <a href="barn-blueprint-5k.html" class="nav-item">📐 Blueprint</a>
            <a href="barn-mockups.html" class="nav-item">🖼️ Mockups</a>
        </nav>
        
        <div class="main-content">
            <div class="container">
                <h1>✅ Naples Property — To Do</h1>
                
                <div class="stats">
                    <div class="stat-box">
                        <div class="number" id="totalTasks">0</div>
                        <div class="label">Total Tasks</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="completedTasks">0</div>
                        <div class="label">Completed</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="remainingTasks">0</div>
                        <div class="label">Remaining</div>
                    </div>
                </div>
                
                <div class="add-task">
                    <input type="text" id="newTaskInput" placeholder="Add a new task..." onkeypress="if(event.key==='Enter')addTask()">
                    <button onclick="addTask()">Add Task</button>
                </div>
                
                <div class="categories">
                    <button class="category-btn active" data-category="all" onclick="filterCategory('all')">All</button>
                    <button class="category-btn" data-category="permits" onclick="filterCategory('permits')">🏛️ Permits</button>
                    <button class="category-btn" data-category="design" onclick="filterCategory('design')">📐 Design</button>
                    <button class="category-btn" data-category="construction" onclick="filterCategory('construction')">🏗️ Construction</button>
                    <button class="category-btn" data-category="equipment" onclick="filterCategory('equipment')">🎯 Equipment</button>
                </div>
                
                <div class="task-list" id="taskList"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Mobile menu
        function toggleMobileMenu() {
            const nav = document.getElementById('leftNav');
            const overlay = document.getElementById('mobileOverlay');
            const btn = document.getElementById('mobileMenuBtn');
            
            nav.classList.toggle('open');
            overlay.classList.toggle('show');
            btn.classList.toggle('open');
            btn.textContent = btn.classList.contains('open') ? '✕' : '☰';
        }
        
        let tasks = [];
        let currentFilter = 'all';
        let currentCategory = 'permits';
        
        function loadTasks() {
            const saved = localStorage.getItem('naplesPropertyTodos');
            if (saved) {
                tasks = JSON.parse(saved);
            } else {
                tasks = [
                    { id: 1, text: "Privacy bushes?", category: "construction", completed: false },
                    { id: 2, text: "Light up driveway & walkways & trees", category: "construction", completed: false },
                    { id: 3, text: "Garage storage", category: "construction", completed: false },
                    { id: 4, text: "Walls painted", category: "construction", completed: false },
                    { id: 5, text: "Front gate (superiorfenceandrail.com)", category: "construction", completed: false },
                    { id: 6, text: "Landscaping", category: "construction", completed: false },
                    { id: 7, text: "Furniture", category: "equipment", completed: false },
                    { id: 8, text: "Filing cabinet", category: "equipment", completed: false },
                    { id: 9, text: "Whiteboard for wall", category: "equipment", completed: false },
                    { id: 10, text: "Curtains", category: "equipment", completed: false },
                    { id: 11, text: "Glass garage doors", category: "construction", completed: false },
                    { id: 12, text: "220 in garage for sauna", category: "construction", completed: false },
                    { id: 13, text: "Tesla charger in garage", category: "construction", completed: false },
                    { id: 14, text: "New gym mat", category: "equipment", completed: false },
                    { id: 15, text: "Tortoise 🐢", category: "equipment", completed: false },
                    { id: 16, text: "Patio furniture", category: "equipment", completed: false },
                    { id: 17, text: "House and garage speaker system", category: "equipment", completed: false },
                    { id: 18, text: "Tesla power walls", category: "construction", completed: false },
                    { id: 19, text: "Tesla solar panels", category: "construction", completed: false },
                    { id: 20, text: "Mini golf course (popstroke style, leaderboard)", category: "design", completed: false },
                ];
            }
            renderTasks();
        }
        
        function saveTasks() {
            localStorage.setItem('naplesPropertyTodos', JSON.stringify(tasks));
        }
        
        function addTask() {
            const input = document.getElementById('newTaskInput');
            const text = input.value.trim();
            if (!text) return;
            
            const activeCategory = document.querySelector('.category-btn.active');
            let category = activeCategory ? activeCategory.dataset.category : 'permits';
            if (category === 'all') category = 'permits';
            
            tasks.push({
                id: Date.now(),
                text: text,
                category: category,
                completed: false
            });
            
            input.value = '';
            saveTasks();
            renderTasks();
        }
        
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }
        
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }
        
        function filterCategory(category) {
            currentFilter = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
            renderTasks();
        }
        
        function renderTasks() {
            const list = document.getElementById('taskList');
            const filtered = currentFilter === 'all' 
                ? tasks 
                : tasks.filter(t => t.category === currentFilter);
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <h3>No tasks yet</h3>
                        <p>Add your first task above</p>
                    </div>
                `;
            } else {
                list.innerHTML = filtered.map(task => `
                    <div class="task-item ${task.completed ? 'completed' : ''}">
                        <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})"></div>
                        <span class="task-text">${task.text}</span>
                        <span class="task-category ${task.category}">${task.category}</span>
                        <button class="task-delete" onclick="deleteTask(${task.id})">×</button>
                    </div>
                `).join('');
            }
            
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('completedTasks').textContent = tasks.filter(t => t.completed).length;
            document.getElementById('remainingTasks').textContent = tasks.filter(t => !t.completed).length;
        }
        
        loadTasks();
    </script>
</body>
</html>
